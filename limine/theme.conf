# SumiNami Limine Theme - Kanagawa
# Prepend this to your limine.conf

# Wallpaper (dimmed version copied to boot partition)
wallpaper: boot():/suminami/wallpaper.jpg
wallpaper_style: stretched

# Background color for areas not covered by wallpaper
backdrop: 1F1F28

# Branding
interface_branding: SumiNami
interface_branding_colour: 6

# Editor and console (standard features)
editor_enabled: yes
editor_highlighting: yes
editor_validation: yes

# Kanagawa color palette (8 colors: black;red;green;brown;blue;magenta;cyan;gray)
term_palette: 16161D;C34043;76946A;C0A36E;7E9CD8;957FB8;7FB4CA;727169
term_palette_bright: 2A2A37;E82424;98BB6C;E6C384;7FB4CA;D27E99;A3D4D5;9CABCA

# Terminal colors (AARRGGBB - AA is alpha, 00=transparent, FF=opaque)
term_background: CC1F1F28
term_foreground: DCD7BA
term_foreground_bright: FFFFFF

# Margins
term_margin: 32
term_margin_gradient: 4
