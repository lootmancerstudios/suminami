# SumiNami btop config

# Use Kanagawa theme
color_theme = "kanagawa"

# Theme background (transparent for terminal bg)
theme_background = False

# Use truecolor (24-bit)
truecolor = True

# Rounded corners
rounded_corners = True

# Graph symbol to use (braille, block, tty)
graph_symbol = "braille"

# Show processes as tree
proc_tree = False

# Show CPU box
shown_boxes = "cpu mem net proc"

# Update time in milliseconds
update_ms = 1000

# Process sorting
proc_sorting = "cpu lazy"

# Show battery stats if available
show_battery = True

# Show GPU stats if available
show_gpu_info = True
