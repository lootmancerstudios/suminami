# Kanagawa color scheme for alacritty

[colors.primary]
background = "#16161D"
foreground = "#DCD7BA"

[colors.cursor]
text   = "#16161D"
cursor = "#C8C093"

[colors.selection]
text       = "#C8C093"
background = "#2D4F67"

[colors.normal]
black   = "#090618"
red     = "#C34043"
green   = "#76946A"
yellow  = "#C0A36E"
blue    = "#7E9CD8"
magenta = "#957FB8"
cyan    = "#6A9589"
white   = "#C8C093"

[colors.bright]
black   = "#727169"
red     = "#E46876"
green   = "#98BB6C"
yellow  = "#E6C384"
blue    = "#7FB4CA"
magenta = "#938AA9"
cyan    = "#7AA89F"
white   = "#DCD7BA"

[window]
confirm_on_close = false

# Uncomment to set a specific font:
# [font]
# normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
# size = 12.0
