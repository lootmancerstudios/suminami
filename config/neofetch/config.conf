# SumiNami Neofetch Config - Kanagawa Theme

print_info() {
    # Colors (Kanagawa-inspired)
    local c1="\e[38;2;118;148;106m"  # autumnGreen - System
    local c2="\e[38;2;127;180;202m"  # springBlue - Desktop
    local c3="\e[38;2;149;127;184m"  # oniViolet - Hardware
    local c4="\e[38;2;230;195;132m"  # carpYellow - Accent
    local r="\e[0m"                   # Reset

    echo ""

    # System Section
    printf "${c1}╭───────────  System ───────────╮${r}\n"
    prin "│  󰣇" "$(cat /etc/os-release | grep "^PRETTY_NAME" | cut -d'"' -f2)"
    prin "│  󰌽" "$(uname -r)"
    prin "│  󰏖" "$(pacman -Q | wc -l) (pacman)"
    prin "╰  󰆍" "$SHELL"

    echo ""

    # Desktop Section
    printf "${c2}╭──────────  Desktop ───────────╮${r}\n"
    prin "│  󰍹" "$WM"
    prin "│  󰄛" "$TERM"
    prin "│  󰛖" "$TERM_FONT"
    prin "│  󰉼" "$GTK_THEME"
    prin "│  󰀻" "$ICONS"
    prin "╰  󰇀" "$CURSOR"

    echo ""

    # Hardware Section
    printf "${c3}╭──────────  Hardware ──────────╮${r}\n"
    prin "│  󰟀" "$MODEL"
    prin "│  󰻠" "$CPU"
    prin "│  󰍛" "$GPU"
    prin "│  󰑭" "$MEMORY"
    prin "│  󰋊" "$DISK"
    prin "╰  󰅐" "$UPTIME"

    echo ""
}

# Title
title_fqdn="off"

# Kernel
kernel_shorthand="on"

# Distro
distro_shorthand="off"
os_arch="on"

# Uptime
uptime_shorthand="on"

# Memory
memory_percent="on"
memory_unit="gib"

# Packages
package_managers="on"

# Shell
shell_path="off"
shell_version="on"

# CPU
speed_type="bios_limit"
speed_shorthand="on"
cpu_brand="on"
cpu_speed="on"
cpu_cores="logical"
cpu_temp="off"

# GPU
gpu_brand="on"
gpu_type="all"

# Disk
disk_show=('/')
disk_subtitle="mount"
disk_percent="on"

# Text Options
colors=(distro)
bold="on"
underline_enabled="on"
underline_char="-"
separator=" "

# Color Blocks
color_blocks="off"

# Image Backend
image_backend="ascii"
image_source="auto"

# Ascii Options
ascii_distro="auto"
ascii_colors=(4)
ascii_bold="on"

# Gap between image and text
gap=3

# Stdout mode
stdout="off"
