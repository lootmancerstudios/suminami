# SumiNami hyprlock config
# Matches SDDM theme (Kanagawa palette)

general {
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
}

# Background with blur
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# Clock - top right
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(220, 215, 186, 1.0)
    font_size = 48
    font_family = JetBrainsMono Nerd Font Bold
    position = -32, -32
    halign = right
    valign = top
}

# Date - below clock
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgba(114, 113, 105, 1.0)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = -32, -100
    halign = right
    valign = top
}

# Password input field
input-field {
    monitor =
    size = 280, 48
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(54, 54, 70, 1.0)
    inner_color = rgba(31, 31, 40, 1.0)
    font_color = rgba(220, 215, 186, 1.0)
    fade_on_empty = false
    fade_timeout = 1000
    placeholder_text = <span foreground="##727169">Password</span>
    hide_input = false
    rounding = 0
    check_color = rgba(210, 126, 153, 1.0)
    fail_color = rgba(228, 104, 118, 1.0)
    fail_text = <span foreground="##E46876">$FAIL</span>
    fail_timeout = 2000
    fail_transition = 300
    capslock_color = rgba(231, 194, 102, 1.0)
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, 0
    halign = center
    valign = center
}

# Lock icon above input
label {
    monitor =
    text = 󰌾
    color = rgba(210, 126, 153, 1.0)
    font_size = 32
    font_family = JetBrainsMono Nerd Font
    position = 0, 60
    halign = center
    valign = center
}
