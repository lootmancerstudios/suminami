# Set programs that you use
$terminal = kitty
$fileManager = thunar
$menu = ~/.config/waybar/scripts/launcher
$browser = firefox

# Environment variables
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Autostart
# exec-once = $terminal
# exec-once = nm-applet &
exec-once = ~/.config/waybar/scripts/generate-style && waybar
exec-once = bash -c 'wp=$(cat ~/.config/suminami/current-wallpaper 2>/dev/null || echo ~/.config/suminami/wallpapers/kanagawa.jpg); if command -v awww-daemon >/dev/null; then awww-daemon && awww img "$wp"; elif command -v swww-daemon >/dev/null; then swww-daemon && swww img "$wp"; fi'
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
# exec-once = hypridle  # Added by install.sh if hyprlock/hypridle are installed