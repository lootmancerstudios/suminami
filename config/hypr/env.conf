# Set programs that you use
$terminal = kitty
$fileManager = thunar
$menu = ~/.config/waybar/scripts/launcher
$browser = firefox

# Environment variables
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Autostart
# exec-once = $terminal
# exec-once = nm-applet &
exec-once = ~/.config/waybar/scripts/generate-style && waybar
exec-once = swww-daemon && swww img "$(cat ~/.config/suminami/current-wallpaper 2>/dev/null || echo ~/.config/suminami/wallpapers/kanagawa.jpg)"
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
# exec-once = hypridle  # Added by install.sh if hyprlock/hypridle are installed